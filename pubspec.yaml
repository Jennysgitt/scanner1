name: securityscanner
description: "SecureGate AI - Campus Security System Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1   # ← add this line
  # ... rest of your dependencies

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Supabase - CRITICAL VERSION
  supabase_flutter: ^2.3.4

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner_plus: ^2.0.14
  mobile_scanner: ^5.2.3

  # Image Picker & Camera
  image_picker: ^1.0.7
  camera: ^0.11.0+1

  # Storage & File
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # UI Components
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  crypto: ^3.0.3



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
